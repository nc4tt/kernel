<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nc4tt · kernel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #F9F9F9;
            --surface: #FFFFFF;
            --surface-2: #F2F2F2;
            --on-bg: #0A0A0A;
            --on-dim: #888;
            --border: #E4E4E4;
            --border-strong: #C8C8C8;
            --accent: #0A0A0A;
            --accent-fg: #FFFFFF;
            --font: 'JetBrains Mono', ui-monospace, monospace;
            --r: 14px;
            --ease: cubic-bezier(0.2, 0, 0, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--on-bg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Shapes ── */
        .shapes {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .shape { position: absolute; opacity: 0; }

        .s1 {
            width: 300px; height: 300px;
            border-radius: 90px;
            border: 1.5px solid var(--border);
            top: -80px; right: -80px;
            transform: rotate(15deg);
        }

        .s2 {
            width: 180px; height: 60px;
            border-radius: 60px;
            border: 1.5px solid var(--border);
            bottom: 12%; left: -40px;
            transform: rotate(-8deg);
        }

        .s3 {
            width: 60px; height: 60px;
            border-radius: 18px;
            background: var(--border);
            top: 42%; right: 30px;
            transform: rotate(22deg);
        }

        .s4 {
            width: 20px; height: 20px;
            border-radius: 5px;
            background: var(--on-bg);
            top: 22%; left: 18px;
            transform: rotate(45deg);
        }

        /* ── Layout ── */
        .layout {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 0 0;
            opacity: 0;
        }

        .wordmark {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--on-bg);
        }

        .wordmark span { color: var(--on-dim); font-weight: 400; }

        .header-tag {
            font-size: 0.72rem;
            color: var(--on-dim);
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        /* ── Hero ── */
        .hero {
            padding: 40px 0 28px;
            opacity: 0;
        }

        .hero-sub {
            font-size: 0.78rem;
            color: var(--on-dim);
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.01em;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 24px;
        }

        /* ── Loader ── */
        #loader {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 48px 0;
            color: var(--on-dim);
            font-size: 0.78rem;
        }

        .loader-track {
            width: 36px; height: 2px;
            border-radius: 2px;
            background: var(--border);
            overflow: hidden;
            position: relative;
        }

        .loader-bar {
            position: absolute; inset: 0;
            border-radius: 2px;
            background: var(--on-bg);
            animation: slide 1.1s ease-in-out infinite;
        }

        @keyframes slide {
            0%   { transform: translateX(-100%) scaleX(0.5); }
            50%  { transform: translateX(20%)   scaleX(0.8); }
            100% { transform: translateX(200%)  scaleX(0.5); }
        }

        /* ── Cards ── */
        .release-card {
            opacity: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 22px 24px;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.18s var(--ease), transform 0.18s var(--ease), box-shadow 0.18s var(--ease);
        }

        .release-card::before {
            content: '';
            position: absolute;
            width: 88px; height: 88px;
            border-radius: 26px;
            border: 1px solid var(--border);
            bottom: -32px; right: -24px;
            transform: rotate(18deg);
            pointer-events: none;
            transition: border-color 0.2s;
        }

        .release-card:hover {
            border-color: var(--border-strong);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .release-card:hover::before { border-color: var(--border-strong); }

        .release-card.latest { border-color: var(--on-bg); }

        .latest-badge {
            position: absolute;
            top: 16px; right: 16px;
            background: var(--accent);
            color: var(--accent-fg);
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 100px;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 9px;
        }

        .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--surface-2);
            color: var(--on-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 9px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .tag-chip svg {
            width: 10px; height: 10px;
            stroke: var(--on-bg); fill: none;
            stroke-width: 2.2; stroke-linecap: round;
        }

        .date-chip {
            font-size: 0.7rem;
            color: var(--on-dim);
            font-weight: 400;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--on-bg);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        /* changelog */
        .changelog-wrap { position: relative; }

        .changelog {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 15px;
            font-size: 0.75rem;
            color: var(--on-dim);
            line-height: 1.8;
            max-height: 120px;
            overflow: hidden;
            transition: max-height 0.45s cubic-bezier(0.2, 0, 0, 1);
        }

        .changelog.open { max-height: 2000px; }

        .changelog-fade {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 44px;
            background: linear-gradient(to top, var(--surface), transparent);
            border-radius: 0 0 10px 10px;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .changelog.open + .changelog-fade { opacity: 0; }

        .changelog h1, .changelog h2, .changelog h3 {
            color: var(--on-bg); font-weight: 700; margin: 8px 0 4px;
        }
        .changelog h1 { font-size: 0.82rem; }
        .changelog h2 { font-size: 0.78rem; }
        .changelog h3 { font-size: 0.75rem; }
        .changelog p { margin-bottom: 5px; }
        .changelog ul, .changelog ol { padding-left: 14px; margin-bottom: 5px; }
        .changelog li { margin-bottom: 2px; }
        .changelog code {
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 0.72rem;
            color: var(--on-bg);
        }
        .changelog pre {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            overflow-x: auto;
            margin: 5px 0;
        }
        .changelog pre code { background: none; border: none; padding: 0; }
        .changelog strong { color: var(--on-bg); font-weight: 700; }
        .changelog a { color: var(--on-bg); }
        .changelog a:hover { opacity: 0.65; }
        .changelog blockquote {
            border-left: 2px solid var(--border-strong);
            padding-left: 10px; margin: 6px 0; font-style: italic;
        }

        /* actions */
        .card-actions {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-top: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: var(--font);
            font-size: 0.72rem;
            font-weight: 700;
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid transparent;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: opacity 0.15s, transform 0.15s var(--ease), box-shadow 0.15s;
        }

        .btn svg {
            width: 12px; height: 12px;
            stroke: currentColor; fill: none;
            stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
        }

        .btn-filled {
            background: var(--accent);
            color: var(--accent-fg);
        }

        .btn-filled:hover {
            opacity: 0.82;
            transform: translateY(-1px);
            box-shadow: 0 3px 12px rgba(0,0,0,0.2);
        }

        .btn-outline {
            background: transparent;
            color: var(--on-bg);
            border-color: var(--border-strong);
        }

        .btn-outline:hover { background: var(--surface-2); transform: translateY(-1px); }

        /* ── Footer ── */
        footer {
            padding: 28px 0 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            color: var(--on-dim);
            font-size: 0.68rem;
            border-top: 1px solid var(--border);
            margin-top: 8px;
        }

        footer a {
            color: var(--on-dim);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        footer a:hover { color: var(--on-bg); }

        /* ── Error ── */
        .error-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 24px;
        }

        .error-card strong { font-weight: 700; font-size: 0.82rem; }
        .error-card p { color: var(--on-dim); font-size: 0.75rem; margin-top: 4px; }

        @media (max-width: 480px) {
            .release-card { padding: 18px 20px; }
            .latest-badge { display: none; }
        }
    </style>
</head>
<body>

<div class="shapes" aria-hidden="true">
    <div class="shape s1"></div>
    <div class="shape s2"></div>
    <div class="shape s3"></div>
    <div class="shape s4"></div>
</div>

<div class="layout">

    <header id="site-header">
        <span class="wordmark">nc4tt<span>/kernel</span></span>
        <span class="header-tag">Galaxy A32 · SM-A325F</span>
    </header>

    <section class="hero" id="hero">
        <p class="hero-sub">// look, a new kernel.</p>
    </section>

    <div class="divider"></div>

    <main id="main-content">
        <div id="loader">
            <div class="loader-track"><div class="loader-bar"></div></div>
            <span>fetching releases…</span>
        </div>
        <div id="releases-container"></div>
    </main>

    <footer id="site-footer">
        <span>nc4tt · kernel releases</span>
        <a href="https://github.com/nc4tt/kernel" target="_blank" rel="noopener">
            github
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
            </svg>
        </a>
    </footer>

</div>

<script>
    marked.setOptions({ breaks: true, gfm: true });

    function toggle(btn, log) {
        const open = log.classList.toggle('open');
        btn.textContent = open ? 'less' : 'more';
    }

    function buildCard(release, i) {
        const isLatest = i === 0;
        const date = new Date(release.published_at).toLocaleDateString('en-US', {
            year: 'numeric', month: 'short', day: 'numeric'
        });
        const body = release.body || '';
        const rendered = body ? marked.parse(body) : '<em>no release notes.</em>';
        const isLong = body.length > 300;

        const card = document.createElement('div');
        card.className = 'release-card' + (isLatest ? ' latest' : '');

        card.innerHTML = `
            ${isLatest ? '<span class="latest-badge">Latest</span>' : ''}
            <div class="card-meta">
                <span class="tag-chip">
                    <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    ${release.tag_name}
                </span>
                <span class="date-chip">${date}</span>
            </div>
            <div class="card-title">${release.name || release.tag_name}</div>
            <div class="changelog-wrap">
                <div class="changelog ${isLong ? '' : 'open'}">${rendered}</div>
                ${isLong ? '<div class="changelog-fade"></div>' : ''}
            </div>
            <div class="card-actions">
                <a href="${release.html_url}" target="_blank" rel="noopener" class="btn btn-filled">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    download
                </a>
                ${isLong ? `<button class="btn btn-outline expand-btn">more</button>` : ''}
            </div>
        `;

        if (isLong) {
            const btn = card.querySelector('.expand-btn');
            const log = card.querySelector('.changelog');
            btn.addEventListener('click', () => toggle(btn, log));
        }

        return card;
    }

    async function fetchReleases() {
        const container = document.getElementById('releases-container');
        try {
            const res = await fetch('https://api.github.com/repos/nc4tt/kernel/releases');
            if (!res.ok) throw new Error();
            const data = await res.json();
            data.sort((a, b) => new Date(b.published_at) - new Date(a.published_at));

            document.getElementById('loader').style.display = 'none';
            data.forEach((r, i) => container.appendChild(buildCard(r, i)));

            anime({
                targets: '.release-card',
                opacity: [0, 1],
                translateY: [14, 0],
                delay: anime.stagger(55, { start: 30 }),
                easing: 'cubicBezier(0.2,0,0,1)',
                duration: 440
            });
        } catch {
            document.getElementById('loader').innerHTML = `
                <div class="error-card">
                    <strong>couldn't load releases</strong>
                    <p>check your connection and try again.</p>
                </div>`;
        }
    }

    anime.timeline({ easing: 'cubicBezier(0.2,0,0,1)' })
        .add({ targets: '#site-header', opacity: [0,1], translateY: [-10,0], duration: 480 })
        .add({ targets: '#hero',        opacity: [0,1], translateY: [8,0],   duration: 440 }, '-=280')
        .add({ targets: '.s1,.s2',      opacity: [0, 0.5], duration: 800 }, '-=500')
        .add({ targets: '.s3',          opacity: [0, 0.55], duration: 600 }, '-=650')
        .add({ targets: '.s4',          opacity: [0, 0.85], duration: 500 }, '-=550');

    fetchReleases();
</script>
</body>
</html>
