<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ncatt · kernel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ── Carbon Token System (Gray 100 Dark Theme) ── */
        :root {
            --cds-background:         #161616;
            --cds-layer-01:           #262626;
            --cds-layer-02:           #393939;
            --cds-text-primary:       #f4f4f4;
            --cds-text-secondary:     #c6c6c6;
            --cds-text-placeholder:   #6f6f6f;
            --cds-border-subtle:      #393939;
            --cds-border-strong:      #525252;
            --cds-link-primary:       #78a9ff;
            --cds-link-primary-hover: #a6c8ff;
            --cds-button-primary:     #0f62fe;
            --cds-button-primary-hover: #0353e9;
            --cds-button-secondary:   #393939;
            --cds-button-secondary-hover: #4c4c4c;
            --cds-focus:              #78a9ff;
            --cds-support-error:      #ff8389;
            --cds-support-success:    #42be65;
            --cds-overlay:            rgba(0,0,0,0.65);
            --font-sans: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
            --font-mono: 'IBM Plex Mono', 'Menlo', 'Courier', monospace;
            --ease: cubic-bezier(0.2, 0, 0, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-sans);
            background: var(--cds-background);
            color: var(--cds-text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Layout ── */
        .layout {
            max-width: 1056px;
            margin: 0 auto;
            padding: 0 32px;
        }

        /* ── Navigation Masthead ── */
        nav.masthead {
            background: #000000;
            height: 48px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--cds-border-subtle);
            opacity: 0;
        }

        .masthead-inner {
            max-width: 1056px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .wordmark {
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.16px;
            color: var(--cds-text-primary);
            display: flex;
            align-items: center;
            gap: 0;
        }

        .wordmark-sep {
            color: var(--cds-border-strong);
            margin: 0 6px;
            font-weight: 300;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0;
            list-style: none;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            height: 48px;
            padding: 0 16px;
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.16px;
            color: var(--cds-text-secondary);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: color 0.1s, background 0.1s, border-color 0.1s;
        }

        .nav-links a:hover {
            color: var(--cds-text-primary);
            background: var(--cds-layer-01);
        }

        .nav-links a.active {
            color: var(--cds-text-primary);
            border-bottom-color: var(--cds-link-primary);
        }

        /* ── Hero ── */
        .hero {
            padding: 64px 0 48px;
            border-bottom: 1px solid var(--cds-border-subtle);
            opacity: 0;
        }

        .hero-eyebrow {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.32px;
            color: var(--cds-link-primary);
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .hero-title {
            font-family: var(--font-sans);
            font-size: 42px;
            font-weight: 300;
            line-height: 1.19;
            letter-spacing: 0;
            color: var(--cds-text-primary);
            margin-bottom: 16px;
        }

        .hero-sub {
            font-family: var(--font-sans);
            font-size: 16px;
            font-weight: 400;
            line-height: 1.50;
            color: var(--cds-text-secondary);
            max-width: 640px;
        }

        /* ── Section Header ── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 32px 0 24px;
            border-bottom: 1px solid var(--cds-border-subtle);
            margin-bottom: 0;
        }

        .section-label {
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.16px;
            color: var(--cds-text-secondary);
            text-transform: uppercase;
        }

        .release-count {
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.32px;
            color: var(--cds-text-placeholder);
        }

        /* ── Loader ── */
        #loader {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 40px 0;
            color: var(--cds-text-secondary);
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.32px;
            border-top: 1px solid var(--cds-border-subtle);
        }

        .loader-track {
            width: 64px;
            height: 2px;
            background: var(--cds-layer-02);
            position: relative;
            overflow: hidden;
        }

        .loader-bar {
            position: absolute; inset: 0;
            background: var(--cds-link-primary);
            animation: slide 1.2s var(--ease) infinite;
        }

        @keyframes slide {
            0%   { transform: translateX(-100%) scaleX(0.4); }
            50%  { transform: translateX(30%)   scaleX(0.9); }
            100% { transform: translateX(200%)  scaleX(0.4); }
        }

        /* ── Release Row (tile) ── */
        .release-tile {
            opacity: 0;
            display: grid;
            grid-template-columns: 160px 1fr auto;
            align-items: start;
            gap: 0 32px;
            padding: 24px 0;
            border-bottom: 1px solid var(--cds-border-subtle);
            transition: background 0.15s var(--ease);
            position: relative;
        }

        .release-tile::after {
            content: '';
            position: absolute;
            left: -32px; right: -32px;
            top: 0; bottom: 0;
            pointer-events: none;
            transition: background 0.15s;
        }

        .release-tile:hover::after {
            background: rgba(255,255,255,0.02);
        }

        .tile-meta {
            padding-top: 2px;
        }

        .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--cds-layer-01);
            color: var(--cds-link-primary);
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.32px;
            padding: 4px 8px;
            border-radius: 0;
            margin-bottom: 8px;
            border: 1px solid var(--cds-border-subtle);
        }

        .tag-chip.latest {
            background: var(--cds-button-primary);
            color: #ffffff;
            border-color: var(--cds-button-primary);
        }

        .date-chip {
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.32px;
            color: var(--cds-text-placeholder);
            display: block;
        }

        .tile-body { }

        .tile-title {
            font-family: var(--font-sans);
            font-size: 20px;
            font-weight: 400;
            line-height: 1.40;
            color: var(--cds-text-primary);
            margin-bottom: 12px;
        }

        /* changelog */
        .changelog-wrap { position: relative; }

        .changelog {
            background: var(--cds-layer-01);
            border-left: 2px solid var(--cds-border-subtle);
            padding: 12px 16px;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.16px;
            color: var(--cds-text-secondary);
            line-height: 1.8;
            max-height: 128px;
            overflow: hidden;
            transition: max-height 0.5s var(--ease);
        }

        .changelog.open { max-height: 4000px; }

        .changelog-fade {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 48px;
            background: linear-gradient(to top, var(--cds-layer-01), transparent);
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .changelog.open + .changelog-fade { opacity: 0; }

        .changelog h1, .changelog h2, .changelog h3 {
            font-family: var(--font-sans);
            color: var(--cds-text-primary);
            font-weight: 600;
            margin: 10px 0 4px;
            letter-spacing: 0.16px;
        }

        .changelog h1 { font-size: 14px; }
        .changelog h2 { font-size: 13px; }
        .changelog h3 { font-size: 12px; }
        .changelog p  { margin-bottom: 4px; }
        .changelog ul, .changelog ol { padding-left: 16px; margin-bottom: 4px; }
        .changelog li { margin-bottom: 2px; }

        .changelog code {
            background: var(--cds-layer-02);
            border: 1px solid var(--cds-border-subtle);
            padding: 1px 5px;
            font-size: 11px;
            color: var(--cds-link-primary);
            font-family: var(--font-mono);
        }

        .changelog pre {
            background: var(--cds-layer-02);
            border: 1px solid var(--cds-border-subtle);
            padding: 10px;
            overflow-x: auto;
            margin: 6px 0;
        }

        .changelog pre code { background: none; border: none; padding: 0; }
        .changelog strong { color: var(--cds-text-primary); font-weight: 600; }

        .changelog a {
            color: var(--cds-link-primary);
            text-decoration: none;
        }

        .changelog a:hover { color: var(--cds-link-primary-hover); text-decoration: underline; }

        .changelog blockquote {
            border-left: 2px solid var(--cds-border-strong);
            padding-left: 10px; margin: 6px 0; font-style: italic;
            color: var(--cds-text-placeholder);
        }

        /* tile actions */
        .tile-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            padding-top: 2px;
        }

        /* ── Carbon Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.16px;
            padding: 0 63px 0 15px;
            height: 40px;
            border-radius: 0;
            border: 1px solid transparent;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            transition: background 0.1s var(--ease);
            position: relative;
        }

        .btn svg {
            width: 16px; height: 16px;
            stroke: currentColor; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
            flex-shrink: 0;
            position: absolute;
            right: 16px;
        }

        .btn-primary {
            background: var(--cds-button-primary);
            color: #ffffff;
        }

        .btn-primary:hover { background: var(--cds-button-primary-hover); }
        .btn-primary:active { background: #002d9c; }

        .btn-secondary {
            background: var(--cds-button-secondary);
            color: var(--cds-text-primary);
        }

        .btn-secondary:hover { background: var(--cds-button-secondary-hover); }

        .btn-ghost {
            background: transparent;
            color: var(--cds-link-primary);
            border-color: transparent;
            padding: 0 40px 0 0;
            font-size: 12px;
        }

        .btn-ghost:hover { background: var(--cds-layer-01); }

        /* card-actions under changelog */
        .card-actions {
            display: flex;
            align-items: center;
            gap: 0;
            margin-top: 12px;
        }

        /* ── Footer ── */
        footer {
            padding: 24px 0 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 0;
        }

        .footer-left {
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.32px;
            color: var(--cds-text-placeholder);
        }

        .footer-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.16px;
            color: var(--cds-link-primary);
            text-decoration: none;
            transition: color 0.1s;
        }

        .footer-link:hover { color: var(--cds-link-primary-hover); text-decoration: underline; }

        .footer-link svg {
            width: 16px; height: 16px;
            stroke: currentColor; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }

        /* ── Error ── */
        .error-tile {
            border-top: 1px solid var(--cds-border-subtle);
            padding: 24px 0;
        }

        .error-tile strong {
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 600;
            color: var(--cds-support-error);
            letter-spacing: 0.16px;
        }

        .error-tile p {
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.32px;
            color: var(--cds-text-placeholder);
            margin-top: 6px;
        }

        /* ── Divider rule ── */
        .rule {
            height: 1px;
            background: var(--cds-border-subtle);
        }

        @media (max-width: 768px) {
            .layout { padding: 0 16px; }
            .masthead-inner { padding: 0 16px; }
            .nav-links { display: none; }
            .hero { padding: 40px 0 32px; }
            .hero-title { font-size: 32px; }
            .release-tile { grid-template-columns: 1fr; gap: 12px; }
            .tile-actions { flex-direction: row; align-items: center; }
            .btn { padding: 0 48px 0 12px; }
        }
    </style>
</head>
<body>

    <!-- Masthead -->
    <nav class="masthead" id="masthead">
        <div class="masthead-inner">
            <span class="wordmark">
                ncatt<span class="wordmark-sep">/</span>kernel
            </span>
            <ul class="nav-links">
                <li><a href="#" class="active">Releases</a></li>
                <li><a href="https://github.com/adeepsleep/kernel" target="_blank" rel="noopener">GitHub</a></li>
            </ul>
        </div>
    </nav>

    <div class="layout">

        <!-- Hero -->
        <section class="hero" id="hero">
            <p class="hero-eyebrow">ncatt / kernel</p>
            <h1 class="hero-title">Kernel releases</h1>
            <p class="hero-sub">Release history and changelogs for the kernel project. Fetched live from GitHub.</p>
        </section>

        <!-- Section header -->
        <div class="section-header" id="section-header" style="opacity:0">
            <span class="section-label">All releases</span>
            <span class="release-count" id="release-count">—</span>
        </div>

        <!-- Loader & content -->
        <main id="main-content">
            <div id="loader">
                <div class="loader-track"><div class="loader-bar"></div></div>
                <span>fetching releases…</span>
            </div>
            <div id="releases-container"></div>
        </main>

        <!-- Footer -->
        <footer id="site-footer" style="opacity:0;border-top:1px solid var(--cds-border-subtle);margin-top:8px">
            <span class="footer-left">ncatt · kernel releases</span>
            <a href="https://github.com/adeepsleep/kernel" target="_blank" rel="noopener" class="footer-link">
                View on GitHub
                <svg viewBox="0 0 24 24">
                    <line x1="7" y1="17" x2="17" y2="7"/>
                    <polyline points="7 7 17 7 17 17"/>
                </svg>
            </a>
        </footer>

    </div>

    <script>
        marked.setOptions({ breaks: true, gfm: true });

        function toggle(btn, log) {
            const open = log.classList.toggle('open');
            btn.textContent = open ? 'Show less' : 'Show more';
        }

        function buildTile(release, i) {
            const isLatest = i === 0;
            const date = new Date(release.published_at).toLocaleDateString('en-US', {
                year: 'numeric', month: 'short', day: 'numeric'
            });
            const body = release.body || '';
            const rendered = body ? marked.parse(body) : '<em>No release notes.</em>';
            const isLong = body.length > 300;

            const tile = document.createElement('div');
            tile.className = 'release-tile';

            tile.innerHTML = `
                <div class="tile-meta">
                    <span class="tag-chip ${isLatest ? 'latest' : ''}">
                        ${isLatest ? '● LATEST' : '◆'} ${release.tag_name}
                    </span>
                    <span class="date-chip">${date}</span>
                </div>
                <div class="tile-body">
                    <div class="tile-title">${release.name || release.tag_name}</div>
                    <div class="changelog-wrap">
                        <div class="changelog ${isLong ? '' : 'open'}">${rendered}</div>
                        ${isLong ? '<div class="changelog-fade"></div>' : ''}
                    </div>
                    ${isLong ? `
                    <div class="card-actions">
                        <button class="btn btn-ghost expand-btn" style="position:relative;">
                            Show more
                            <svg viewBox="0 0 24 24" style="position:absolute;right:0;top:50%;transform:translateY(-50%)">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </button>
                    </div>` : ''}
                </div>
                <div class="tile-actions">
                    <a href="${release.html_url}" target="_blank" rel="noopener" class="btn btn-primary">
                        Download
                        <svg viewBox="0 0 24 24">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                    </a>
                    <a href="${release.html_url}" target="_blank" rel="noopener" class="btn btn-secondary">
                        View
                        <svg viewBox="0 0 24 24">
                            <line x1="7" y1="17" x2="17" y2="7"/>
                            <polyline points="7 7 17 7 17 17"/>
                        </svg>
                    </a>
                </div>
            `;

            if (isLong) {
                const btn = tile.querySelector('.expand-btn');
                const log = tile.querySelector('.changelog');
                btn.addEventListener('click', () => toggle(btn, log));
            }

            return tile;
        }

        async function fetchReleases() {
            const container = document.getElementById('releases-container');
            try {
                const res = await fetch('https://api.github.com/repos/adeepsleep/kernel/releases');
                if (!res.ok) throw new Error();
                const data = await res.json();
                data.sort((a, b) => new Date(b.published_at) - new Date(a.published_at));

                document.getElementById('loader').style.display = 'none';
                document.getElementById('release-count').textContent = `${data.length} release${data.length !== 1 ? 's' : ''}`;

                data.forEach((r, i) => container.appendChild(buildTile(r, i)));

                anime({
                    targets: '.release-tile',
                    opacity: [0, 1],
                    translateY: [12, 0],
                    delay: anime.stagger(60, { start: 40 }),
                    easing: 'cubicBezier(0.2,0,0,1)',
                    duration: 480
                });
            } catch {
                document.getElementById('loader').innerHTML = `
                    <div class="error-tile">
                        <strong>Could not load releases</strong>
                        <p>Check your connection or view directly on GitHub.</p>
                    </div>`;
            }
        }

        anime.timeline({ easing: 'cubicBezier(0.2,0,0,1)' })
            .add({ targets: '#masthead',        opacity: [0, 1], translateY: [-8, 0], duration: 400 })
            .add({ targets: '#hero',            opacity: [0, 1], translateY: [16, 0], duration: 500 }, '-=200')
            .add({ targets: '#section-header',  opacity: [0, 1],                     duration: 350 }, '-=200')
            .add({ targets: '#site-footer',     opacity: [0, 1],                     duration: 350 }, '-=100');

        fetchReleases();
    </script>
</body>
</html>
