<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ncatt · kernel releases</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:ital,opsz,wght@0,6..144,100..900;1,6..144,100..900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #3B82F6;
            --primary-dim: #60A5FA;
            --primary-container: #DBEAFE;
            --on-primary: #fff;
            --on-primary-container: #1e3a5f;
            --secondary-container: #E0EDFF;
            --surface: #F6FAFF;
            --surface-container: #EBF3FC;
            --surface-high: #DDE9F7;
            --on-surface: #0F1C2E;
            --on-surface-dim: #4B647C;
            --outline: #B2CADF;
            --outline-dim: #D4E4F0;
            --shadow: rgba(59,130,246,0.12);

            --font: 'Google Sans Flex', system-ui, sans-serif;
            --r-sm: 10px;
            --r-md: 18px;
            --r-lg: 26px;
            --r-xl: 32px;
            --ease: cubic-bezier(0.2, 0, 0, 1);
        }

        [data-theme="dark"] {
            --primary: #93C5FD;
            --primary-dim: #60A5FA;
            --primary-container: #1a3554;
            --on-primary: #0c1e30;
            --on-primary-container: #bde0ff;
            --secondary-container: #162840;
            --surface: #0C1520;
            --surface-container: #111D2B;
            --surface-high: #182536;
            --on-surface: #D0E6F8;
            --on-surface-dim: #7A99B0;
            --outline: #2E4A62;
            --outline-dim: #1E3448;
            --shadow: rgba(0,0,0,0.5);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            background: var(--surface);
            color: var(--on-surface);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.35s var(--ease), color 0.35s var(--ease);
        }

        /* ── Decorative shapes layer ── */
        .shapes-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        /* M3 Expressive squircle blob */
        .shape {
            position: absolute;
            transition: opacity 0.4s var(--ease);
        }

        /* Large soft pill — top left */
        .shape-pill {
            width: 520px; height: 320px;
            border-radius: 200px;
            background: radial-gradient(ellipse at 35% 45%, #BFDBFE 0%, #E0F2FE 55%, transparent 100%);
            top: -120px; left: -140px;
            opacity: 0.55;
            filter: blur(8px);
        }

        /* Squircle — top right */
        .shape-squircle {
            width: 220px; height: 220px;
            border-radius: 70px;
            background: linear-gradient(135deg, #BAE6FD 0%, #C7D2FE 100%);
            top: 60px; right: -70px;
            opacity: 0.3;
            filter: blur(4px);
            transform: rotate(18deg);
        }

        /* Diamond cut — mid left */
        .shape-diamond {
            width: 140px; height: 140px;
            border-radius: 36px;
            background: linear-gradient(145deg, #93C5FD 0%, #BAE6FD 100%);
            top: 38%; left: -50px;
            opacity: 0.22;
            filter: blur(2px);
            transform: rotate(42deg);
        }

        /* Soft circle — bottom right */
        .shape-circle {
            width: 360px; height: 360px;
            border-radius: 50%;
            background: radial-gradient(circle, #BFDBFE 0%, #E0EDFF 50%, transparent 100%);
            bottom: -100px; right: -80px;
            opacity: 0.4;
            filter: blur(12px);
        }

        /* Tiny pebble accent */
        .shape-pebble {
            width: 90px; height: 60px;
            border-radius: 50%;
            background: #93C5FD;
            bottom: 30%; left: 55%;
            opacity: 0.18;
            filter: blur(3px);
            transform: rotate(-24deg);
        }

        [data-theme="dark"] .shape-pill { opacity: 0.08; }
        [data-theme="dark"] .shape-squircle { opacity: 0.07; }
        [data-theme="dark"] .shape-diamond { opacity: 0.06; }
        [data-theme="dark"] .shape-circle { opacity: 0.09; }
        [data-theme="dark"] .shape-pebble { opacity: 0.05; }

        /* ── Layout ── */
        .layout {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 0 22px;
        }

        /* ── Header ── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 36px 0 20px;
            opacity: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 13px;
        }

        /* M3 Expressive brand mark — squircle shape */
        .brand-mark {
            width: 46px; height: 46px;
            border-radius: 16px;
            background: var(--primary-container);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .brand-mark::before {
            content: '';
            position: absolute;
            width: 60px; height: 60px;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0.08;
            top: -14px; right: -14px;
        }

        .brand-mark svg {
            width: 22px; height: 22px;
            stroke: var(--primary);
            fill: none;
            stroke-width: 1.7;
            stroke-linecap: round;
            stroke-linejoin: round;
            position: relative;
            z-index: 1;
        }

        .brand-info { display: flex; flex-direction: column; gap: 1px; }

        .brand-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--on-surface);
            font-variation-settings: 'opsz' 20;
        }

        .brand-desc {
            font-size: 0.73rem;
            color: var(--on-surface-dim);
            font-variation-settings: 'opsz' 11;
        }

        /* ── Theme toggle ── */
        .theme-btn {
            width: 46px; height: 46px;
            border-radius: 50%;
            border: 1.5px solid var(--outline-dim);
            background: var(--surface-container);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--on-surface-dim);
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            position: relative; overflow: hidden;
        }

        .theme-btn:hover { border-color: var(--outline); box-shadow: 0 2px 12px var(--shadow); }

        .theme-btn svg {
            width: 19px; height: 19px;
            stroke: currentColor; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
            position: absolute;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        .theme-btn .sun { opacity: 1; transform: scale(1) rotate(0deg); }
        .theme-btn .moon { opacity: 0; transform: scale(0.6) rotate(-80deg); }
        [data-theme="dark"] .theme-btn .sun { opacity: 0; transform: scale(0.6) rotate(80deg); }
        [data-theme="dark"] .theme-btn .moon { opacity: 1; transform: scale(1) rotate(0deg); }

        /* ── Hero strip ── */
        .hero {
            padding: 28px 0 44px;
            opacity: 0;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--primary-container);
            color: var(--on-primary-container);
            border-radius: 100px;
            padding: 5px 14px 5px 10px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 16px;
            font-variation-settings: 'opsz' 11;
        }

        .hero-eyebrow svg {
            width: 12px; height: 12px;
            stroke: var(--primary); fill: none;
            stroke-width: 2.2; stroke-linecap: round;
        }

        .hero-title {
            font-size: clamp(2.1rem, 5.5vw, 3rem);
            font-weight: 820;
            letter-spacing: -0.045em;
            line-height: 1.08;
            color: var(--on-surface);
            font-variation-settings: 'opsz' 60;
        }

        .hero-title .accent {
            color: var(--primary);
            position: relative;
            display: inline-block;
        }

        .hero-sub {
            margin-top: 12px;
            font-size: 0.95rem;
            color: var(--on-surface-dim);
            font-weight: 400;
            font-variation-settings: 'opsz' 16;
        }

        /* ── Loader ── */
        #loader {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 56px 0;
            color: var(--on-surface-dim);
            font-size: 0.9rem;
        }

        .loader-track {
            width: 40px; height: 4px;
            border-radius: 2px;
            background: var(--outline-dim);
            overflow: hidden;
            position: relative;
        }

        .loader-bar {
            position: absolute;
            inset: 0;
            border-radius: 2px;
            background: var(--primary);
            animation: loadSlide 1.2s ease-in-out infinite;
            transform-origin: left;
        }

        @keyframes loadSlide {
            0% { transform: translateX(-100%) scaleX(0.4); }
            50% { transform: translateX(30%) scaleX(0.7); }
            100% { transform: translateX(200%) scaleX(0.4); }
        }

        /* ── Cards ── */
        .release-card {
            opacity: 0;
            background: var(--surface-container);
            border: 1.5px solid var(--outline-dim);
            border-radius: var(--r-xl);
            padding: 26px 28px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.22s var(--ease), transform 0.22s var(--ease), box-shadow 0.22s var(--ease);
        }

        /* M3 Expressive inner accent shape */
        .release-card::after {
            content: '';
            position: absolute;
            width: 160px; height: 160px;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0.03;
            bottom: -60px; right: -40px;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .release-card:hover {
            border-color: var(--outline);
            transform: translateY(-2px);
            box-shadow: 0 6px 28px var(--shadow), 0 1px 6px rgba(0,0,0,0.04);
        }

        .release-card:hover::after { opacity: 0.06; }

        /* Latest card — stronger accent */
        .release-card.latest {
            border-color: color-mix(in srgb, var(--primary) 30%, var(--outline-dim));
            background: color-mix(in srgb, var(--primary-container) 18%, var(--surface-container));
        }

        .latest-badge {
            position: absolute;
            top: 18px; right: 18px;
            background: var(--primary);
            color: var(--on-primary);
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 100px;
            font-variation-settings: 'opsz' 10;
        }

        /* Card meta row */
        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--primary-container);
            color: var(--on-primary-container);
            border-radius: 100px;
            padding: 4px 11px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            font-variation-settings: 'opsz' 12;
        }

        .tag-chip svg {
            width: 11px; height: 11px;
            stroke: var(--primary); fill: none;
            stroke-width: 2.2; stroke-linecap: round;
        }

        .date-chip {
            font-size: 0.78rem;
            color: var(--on-surface-dim);
            font-variation-settings: 'opsz' 12;
        }

        /* Card title */
        .card-title {
            font-size: 1.2rem;
            font-weight: 740;
            letter-spacing: -0.025em;
            color: var(--on-surface);
            margin-bottom: 14px;
            line-height: 1.25;
            font-variation-settings: 'opsz' 24;
        }

        /* Changelog */
        .changelog-wrap { position: relative; }

        .changelog {
            background: var(--surface);
            border: 1px solid var(--outline-dim);
            border-radius: var(--r-md);
            padding: 16px 18px;
            font-size: 0.86rem;
            color: var(--on-surface-dim);
            line-height: 1.75;
            max-height: 150px;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.2, 0, 0, 1);
        }

        .changelog.open { max-height: 2000px; }

        .changelog-fade {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 56px;
            background: linear-gradient(to top, var(--surface-container), transparent);
            border-radius: 0 0 var(--r-md) var(--r-md);
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .changelog.open + .changelog-fade { opacity: 0; }

        .changelog h1, .changelog h2, .changelog h3 {
            color: var(--on-surface);
            font-weight: 680;
            margin: 10px 0 5px;
            letter-spacing: -0.02em;
            font-variation-settings: 'opsz' 18;
        }
        .changelog h1 { font-size: 0.97rem; }
        .changelog h2 { font-size: 0.92rem; }
        .changelog h3 { font-size: 0.88rem; }
        .changelog p { margin-bottom: 7px; }
        .changelog ul, .changelog ol { padding-left: 16px; margin-bottom: 7px; }
        .changelog li { margin-bottom: 2px; }
        .changelog code {
            background: var(--surface-container);
            border: 1px solid var(--outline-dim);
            padding: 1px 5px;
            border-radius: 5px;
            font-size: 0.81rem;
            color: var(--primary);
        }
        .changelog pre {
            background: var(--surface-high);
            border: 1px solid var(--outline-dim);
            border-radius: var(--r-sm);
            padding: 10px;
            overflow-x: auto;
            margin: 6px 0;
        }
        .changelog pre code { background: none; border: none; padding: 0; color: var(--on-surface); }
        .changelog strong { color: var(--on-surface); font-weight: 650; }
        .changelog a { color: var(--primary); text-decoration: none; }
        .changelog a:hover { text-decoration: underline; }
        .changelog blockquote {
            border-left: 3px solid var(--outline);
            padding-left: 11px;
            color: var(--on-surface-dim);
            margin: 7px 0;
            font-style: italic;
        }

        /* Actions */
        .card-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font);
            font-size: 0.84rem;
            font-weight: 620;
            font-variation-settings: 'opsz' 14;
            padding: 9px 19px;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.18s var(--ease), box-shadow 0.18s var(--ease), filter 0.18s;
            letter-spacing: 0.005em;
        }

        .btn svg {
            width: 14px; height: 14px;
            stroke: currentColor; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }

        .btn-filled {
            background: var(--primary);
            color: var(--on-primary);
            box-shadow: 0 1px 6px var(--shadow);
        }

        .btn-filled:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--shadow);
            filter: brightness(1.06);
        }

        .btn-tonal {
            background: var(--secondary-container);
            color: var(--on-primary-container);
        }

        .btn-tonal:hover { transform: translateY(-1px); filter: brightness(0.97); }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--outline-dim) 30%, var(--outline-dim) 70%, transparent);
            margin: 8px 0 20px;
        }

        /* ── Footer ── */
        footer {
            padding: 28px 0 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            color: var(--on-surface-dim);
            font-size: 0.78rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        footer a:hover { text-decoration: underline; }

        /* ── Error ── */
        .error-card {
            background: var(--surface-container);
            border: 1.5px solid var(--outline-dim);
            border-radius: var(--r-lg);
            padding: 30px;
        }

        .error-card strong { color: var(--on-surface); font-weight: 700; }
        .error-card p { color: var(--on-surface-dim); font-size: 0.88rem; margin-top: 5px; }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .hero-title { font-size: 1.9rem; }
            .release-card { padding: 20px; border-radius: var(--r-lg); }
            .card-title { font-size: 1.05rem; }
            .latest-badge { display: none; }
        }
    </style>
</head>
<body>

<!-- Decorative M3 Expressive shapes -->
<div class="shapes-layer" aria-hidden="true">
    <div class="shape shape-pill"></div>
    <div class="shape shape-squircle"></div>
    <div class="shape shape-diamond"></div>
    <div class="shape shape-circle"></div>
    <div class="shape shape-pebble"></div>
</div>

<div class="layout">

    <header id="site-header">
        <div class="brand">
            <div class="brand-mark">
                <svg viewBox="0 0 24 24">
                    <rect x="2" y="3" width="20" height="14" rx="2.5"/>
                    <path d="M8 21h8M12 17v4"/>
                    <circle cx="7" cy="8" r="0.6" fill="currentColor" stroke="none"/>
                    <circle cx="11" cy="8" r="0.6" fill="currentColor" stroke="none"/>
                    <circle cx="15" cy="8" r="0.6" fill="currentColor" stroke="none"/>
                    <path d="M6 11.5h12"/>
                </svg>
            </div>
        </div>
        <button class="theme-btn" id="theme-btn" aria-label="Toggle theme">
            <svg class="sun" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="4.5"/>
                <line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="moon" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </header>

    <!-- Hero — no "Kernel Releases" heading, just a clean intro -->
    <section class="hero" id="hero">
        <div class="hero-eyebrow">
        <p class="hero-sub">look a new kernels</p>
    </section>

    <div class="divider"></div>

    <main id="main-content">
        <div id="loader">
            <div class="loader-track"><div class="loader-bar"></div></div>
            <span>Fetching releases…</span>
        </div>
        <div id="releases-container"></div>
    </main>

    <footer id="site-footer">
        <span>nc4tt - kernel releases page</span>
        <a href="https://github.com/nc4tt/kernel" target="_blank" rel="noopener">
            GitHub
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
            </svg>
        </a>
    </footer>

</div>

<script>
    /* ── Theme ── */
    const html = document.documentElement;
    const themeBtn = document.getElementById('theme-btn');

    function applyTheme(t) {
        html.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
    }

    themeBtn.addEventListener('click', () => {
        applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        anime({ targets: themeBtn, scale: [1, 0.82, 1], duration: 320, easing: 'easeOutBack' });
    });

    applyTheme(localStorage.getItem('theme') ||
        (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));

    /* ── Marked ── */
    marked.setOptions({ breaks: true, gfm: true });

    /* ── Toggle changelog ── */
    function toggle(btn, log) {
        const open = log.classList.toggle('open');
        btn.textContent = open ? 'Show less' : 'Show more';
    }

    /* ── Build card ── */
    function buildCard(release, i) {
        const isLatest = i === 0;
        const date = new Date(release.published_at).toLocaleDateString('en-US', {
            year: 'numeric', month: 'short', day: 'numeric'
        });
        const body = release.body || '';
        const rendered = body ? marked.parse(body) : '<em>No release notes.</em>';
        const isLong = body.length > 300;

        const card = document.createElement('div');
        card.className = 'release-card' + (isLatest ? ' latest' : '');

        card.innerHTML = `
            ${isLatest ? '<span class="latest-badge">Latest</span>' : ''}
            <div class="card-meta">
                <span class="tag-chip">
                    <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    ${release.tag_name}
                </span>
                <span class="date-chip">${date}</span>
            </div>
            <div class="card-title">${release.name || release.tag_name}</div>
            <div class="changelog-wrap">
                <div class="changelog ${isLong ? '' : 'open'}">${rendered}</div>
                ${isLong ? '<div class="changelog-fade"></div>' : ''}
            </div>
            <div class="card-actions">
                <a href="${release.html_url}" target="_blank" rel="noopener" class="btn btn-filled">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download
                </a>
                ${isLong ? `<button class="btn btn-tonal expand-btn">Show more</button>` : ''}
            </div>
        `;

        if (isLong) {
            const btn = card.querySelector('.expand-btn');
            const log = card.querySelector('.changelog');
            btn.addEventListener('click', () => toggle(btn, log));
        }

        return card;
    }

    /* ── Fetch ── */
    async function fetchReleases() {
        const container = document.getElementById('releases-container');
        try {
            const res = await fetch('https://api.github.com/repos/nc4tt/kernel/releases');
            if (!res.ok) throw new Error('err');
            const data = await res.json();
            data.sort((a, b) => new Date(b.published_at) - new Date(a.published_at));

            document.getElementById('loader').style.display = 'none';
            data.forEach((r, i) => container.appendChild(buildCard(r, i)));

            anime({
                targets: '.release-card',
                opacity: [0, 1],
                translateY: [24, 0],
                delay: anime.stagger(70, { start: 60 }),
                easing: 'cubicBezier(0.2,0,0,1)',
                duration: 550
            });
        } catch {
            document.getElementById('loader').innerHTML = `
                <div class="error-card">
                    <strong>Couldn't load releases</strong>
                    <p>Check your connection and try again.</p>
                </div>`;
        }
    }

    /* ── Entrance ── */
    anime.timeline({ easing: 'cubicBezier(0.2,0,0,1)' })
        .add({ targets: '#site-header', opacity: [0,1], translateY: [-14,0], duration: 550 })
        .add({ targets: '#hero', opacity: [0,1], translateY: [18,0], duration: 580 }, '-=360')
        .add({ targets: '.shape', opacity: [0, null], duration: 1000 }, '-=700');

    fetchReleases();
</script>
</body>
</html>
